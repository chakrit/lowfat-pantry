# Golden/invariant cases for wget-compact. Provisional format (smoke harness pending).
command: wget
synthetic: true
cases:
  - sample: samples/wget-success.txt
    sub: download
    args: "https://example.com/releases/app-1.2.3.tar.gz"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/wget-spider.txt
    sub: --spider
    args: "--spider https://example.com/health"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/wget-error.txt
    sub: download
    args: "https://downloads.example.invalid/app.tar.gz"
    exit: 4
    levels: [lite, full, ultra]

