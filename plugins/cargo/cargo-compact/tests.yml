# Golden/invariant cases for cargo-compact. Provisional format (smoke harness pending).
# Samples are synthetic (no Rust crate in this repo to capture from).
command: cargo
synthetic: true
cases:
  - sample: samples/cargo-build-full.txt
    sub: build
    args: ""
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/cargo-build-error.txt
    sub: build
    args: ""
    exit: 101
    levels: [lite, full, ultra]
  - sample: samples/cargo-test-error.txt
    sub: test
    args: ""
    exit: 101
    levels: [lite, full, ultra]
