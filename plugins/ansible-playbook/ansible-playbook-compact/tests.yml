# Golden/invariant cases for ansible-playbook-compact. Provisional (smoke harness pending).
# Samples are synthetic (no Ansible inventory in this repo to capture from).
command: ansible-playbook
synthetic: true
cases:
  - sample: samples/ansible-failure.txt
    sub: ""
    args: "-i prod site.yml"
    exit: 2
    levels: [lite, full, ultra]
  - sample: samples/ansible-success.txt
    sub: ""
    args: "-i prod site.yml"
    exit: 0
    levels: [lite, full, ultra]
