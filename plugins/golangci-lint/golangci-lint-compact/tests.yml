# Golden/invariant cases for golangci-lint-compact. Provisional (smoke harness pending).
# Samples are synthetic (no Go project in this repo to capture from).
command: golangci-lint
synthetic: true
cases:
  - sample: samples/golangci-issues.txt
    sub: run
    args: "run ./..."
    exit: 1
    levels: [lite, full, ultra]
  - sample: samples/golangci-clean.txt
    sub: run
    args: "run ./..."
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/golangci-configerr.txt   # config error must never be hidden
    sub: run
    args: "run ./..."
    exit: 3
    levels: [lite, full, ultra]
