# Golden/invariant cases for glab-compact. Provisional format (smoke harness pending).
# Samples are synthetic (no GitLab remote on this repo to capture from).
command: glab
synthetic: true
cases:
  - sample: samples/glab-mr-list.txt
    sub: mr
    args: "list"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/glab-ci-trace.txt      # --trace: failure at the tail → tail
    sub: ci
    args: "trace --trace"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/glab-mr-json.txt        # -F json: byte-exact passthrough
    sub: mr
    args: "view 214 -F json"
    exit: 0
    levels: [lite, full, ultra]
