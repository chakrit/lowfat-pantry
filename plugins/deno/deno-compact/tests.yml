# Golden/invariant cases for deno-compact. Provisional (smoke harness pending).
command: deno
synthetic: true
cases:
  - sample: samples/deno-test-fail.txt
    sub: test
    args: "test"
    exit: 1
    levels: [lite, full, ultra]
  - sample: samples/deno-check-clean.txt
    sub: check
    args: "check main.ts"
    exit: 0
    levels: [lite, full, ultra]
