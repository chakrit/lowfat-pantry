- name: plugins/rake/rake-compact/tests.cue \ rake-compact \ samples/rake-build.txt lite
  commands:
    - command: lowfat filter plugins/rake/rake-compact/filter.lf --sub=build --args='build' --exit=0 --level=lite < plugins/rake/rake-compact/samples/rake-build.txt
      checks:
        - name: stdout
          data:
            - Compiling widget...
            - Linking...
            - Build complete.
        - name: exitcode
