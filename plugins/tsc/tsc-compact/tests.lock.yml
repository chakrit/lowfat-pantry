            - ""
            - 88     return user.id;
            - '              ~~~~'
            - ""
            - 'src/checkout/config.ts:29:3 - error TS2554: Expected 1 arguments, but got 0.'
            - ""
            - 29   loadSettings();
            - '     ~~~~~~~~~~~~~'
            - ""
            - Found 3 errors in 3 files.
            - ""
