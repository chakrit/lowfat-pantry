- name: tests.cue \ tsc-compact \ samples/tsc-errors.txt lite
  commands:
    - command: lowfat filter plugins/tsc/tsc-compact/filter.lf --sub= --args='--noEmit' --exit=2 --level=lite < plugins/tsc/tsc-compact/samples/tsc-errors.txt
