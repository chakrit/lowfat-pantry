# Golden/invariant cases for wrangler-compact. Provisional format (smoke harness
# pending). All samples real-captured from wrangler 4.99.0 on node:22 (a TS
# worker project; deploys unauthenticated, so deploy itself is the noauth case).
command: wrangler
cases:
  - sample: samples/wrangler-deploy-dryrun.txt
    sub: deploy
    args: "deploy --dry-run --outdir dist"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/wrangler-deploy-err.txt
    sub: deploy
    args: "deploy --dry-run --outdir dist"
    exit: 1
    levels: [lite, full, ultra]
  - sample: samples/wrangler-deploy-noauth.txt
    sub: deploy
    args: "deploy"
    exit: 1
    levels: [full, ultra]
  - sample: samples/wrangler-kv-noauth.txt
    sub: kv
    args: "kv namespace list"
    exit: 1
    levels: [full]
  - sample: samples/wrangler-types.txt
    sub: types
    args: "types"
    exit: 0
    levels: [full, ultra]
