# Golden/invariant cases for journalctl-compact. Provisional format (smoke harness pending).
command: journalctl
synthetic: true
cases:
  - sample: samples/journalctl-unit.txt
    sub: -u
    args: "-u checkout-api"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/journalctl-json.txt
    sub: -u
    args: "-u checkout-api -o json"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/journalctl-error.txt
    sub: -u
    args: "-u checkout-api"
    exit: 1
    levels: [lite, full, ultra]

