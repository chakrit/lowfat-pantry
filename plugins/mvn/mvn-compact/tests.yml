# Golden/invariant cases for mvn-compact. Provisional format (smoke harness pending).
command: mvn
synthetic: true
cases:
  - sample: samples/mvn-test-success.txt
    sub: test
    args: "test"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/mvn-reactor-success.txt
    sub: install
    args: "install"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/mvn-test-failure.txt
    sub: test
    args: "test"
    exit: 1
    levels: [lite, full, ultra]

