# Golden/invariant cases for gradlew-compact. Provisional format (smoke harness pending).
command: gradlew
synthetic: true
cases:
  - sample: samples/gradlew-build-success.txt
    sub: build
    args: "build"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/gradlew-build-downloads.txt
    sub: build
    args: "build"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/gradlew-test-failure.txt
    sub: test
    args: "test"
    exit: 1
    levels: [lite, full, ultra]

