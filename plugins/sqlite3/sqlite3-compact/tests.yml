# Golden/invariant cases for sqlite3-compact. Provisional (smoke harness pending).
command: sqlite3
synthetic: true
cases:
  - sample: samples/sqlite3-rows.txt
    sub: ""
    args: "app.db 'select * from orders'"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/sqlite3-error.txt
    sub: ""
    args: "app.db 'select totl from orders'"
    exit: 1
    levels: [lite, full, ultra]
