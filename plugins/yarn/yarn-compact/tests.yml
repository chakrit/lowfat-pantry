# Golden/invariant cases for yarn-compact. Provisional (smoke harness pending).
# Samples are synthetic (no Yarn project in this repo to capture from).
command: yarn
synthetic: true
cases:
  - sample: samples/yarn-install.txt
    sub: install
    args: "install"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/yarn-install-error.txt
    sub: install
    args: "install"
    exit: 1
    levels: [lite, full, ultra]
  - sample: samples/yarn-test.txt
    sub: test
    args: "test"
    exit: 1
    levels: [lite, full, ultra]
