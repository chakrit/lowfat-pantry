- name: plugins/eslint/eslint-compact/tests.cue \ eslint-compact \ samples/eslint-problems.txt lite
  commands:
    - command: lowfat filter plugins/eslint/eslint-compact/filter.lf --sub= --args='.' --exit=1 --level=lite < plugins/eslint/eslint-compact/samples/eslint-problems.txt
      checks:
        - name: stdout
          data:
            - /Users/dev/shop/src/checkout/api.ts
            - '  12:1   error    ''Optional'' is defined but never used                  no-unused-vars'
            - '  37:89  warning  This line has a length of 112. Maximum allowed is 88  max-len'
            - '  86:9   error    Unexpected console statement                          no-console'
            - '  112:5  error    Expected ''==='' and instead saw ''==''                   eqeqeq'
            - /Users/dev/shop/src/checkout/config.ts
            - '  4:1    error    Run autofix to sort these imports                     simple-import-sort/imports'
            - '  22:7   warning  ''rawEnv'' is assigned a value but never used           no-unused-vars'
            - /Users/dev/shop/src/checkout/models.ts
            - '  57:9   error    Use the rest parameters instead of ''arguments''        prefer-rest-params'
            - ✖ 7 problems (5 errors, 2 warnings)
            - '  3 errors and 0 warnings potentially fixable with the `--fix` option.'
        - name: exitcode
          data:
            - "0"
    - command: lowfat filter plugins/eslint/eslint-compact/filter.lf --sub= --args='.' --exit=1 --level=lite < plugins/eslint/eslint-compact/samples/eslint-problems.txt | scripts/measure.py
      checks:
        - name: stdout
          data:
            - lines 12
            - bytes 829
        - name: exitcode
          data:
            - "0"
