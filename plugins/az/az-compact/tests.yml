# Golden/invariant cases for az-compact. Provisional format (smoke harness
# pending). All samples real-captured from mcr.microsoft.com/azure-cli:latest
# (azure-cli 2.87.0), unauthenticated — so noauth errors are the failure cases.
command: az
cases:
  - sample: samples/az-vm-create-help.txt
    sub: vm
    args: "vm create --help"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/az-storage-help.txt
    sub: storage
    args: "storage --help"
    exit: 0
    levels: [full]
  - sample: samples/az-version.txt
    sub: version
    args: "version"
    exit: 0
    levels: [full, ultra]
  - sample: samples/az-account-noauth.txt
    sub: account
    args: "account show"
    exit: 1
    levels: [full, ultra]
  - sample: samples/az-group-noauth.txt
    sub: group
    args: "group list"
    exit: 1
    levels: [full]
  - sample: samples/az-err-typo.txt
    sub: gruop
    args: "gruop list"
    exit: 2
    levels: [full, ultra]
  - sample: samples/az-cloud-list-table.txt
    sub: cloud
    args: "cloud list -o table"
    exit: 0
    levels: [full, ultra]
  - sample: samples/az-extension-list.txt
    sub: extension
    args: "extension list"
    exit: 0
    levels: [full]
