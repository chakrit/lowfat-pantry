# Golden/invariant cases for npx-compact. Dispatch is driven by args (the wrapped
# tool, after npx flags); sub mirrors args[0] as lowfat would set it. Synthetic.
command: npx
synthetic: true
cases:
  - sample: samples/npx-eslint.txt
    sub: eslint
    args: "eslint src"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/npx-eslint.txt
    sub: "-y"
    args: "-y eslint src"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/npx-prettier-check.txt
    sub: prettier
    args: "prettier --check src"
    exit: 1
    levels: [lite, full, ultra]
  - sample: samples/npx-create.txt
    sub: create-vite
    args: "create-vite demo"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/npx-error.txt
    sub: tsc
    args: "tsc --noEmit"
    exit: 2
    levels: [lite, full, ultra]
