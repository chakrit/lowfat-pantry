# Golden/invariant cases for bun-compact. Provisional (smoke harness pending).
command: bun
synthetic: true
cases:
  - sample: samples/bun-install.txt
    sub: add
    args: "add react"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/bun-test-fail.txt
    sub: test
    args: "test"
    exit: 1
    levels: [lite, full, ultra]
