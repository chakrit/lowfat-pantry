# Golden/invariant cases for curl-compact. Provisional format (smoke harness pending).
command: curl
synthetic: true
cases:
  - sample: samples/curl-verbose-json.txt
    sub: ""
    args: "-v https://api.example.test/v1/users"
    levels: [lite, full, ultra]
  - sample: samples/curl-headers-body.txt
    sub: ""
    args: "-i https://example.test/"
    levels: [lite, full, ultra]
  - sample: samples/curl-error.txt
    sub: ""
    args: "-v https://missing.example.test/"
    exit: 6
    levels: [lite, full, ultra]

