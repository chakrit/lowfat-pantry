- name: tests.cue \ diff-compact \ samples/diff-unified.txt lite
  commands:
    - command: lowfat filter plugins/diff/diff-compact/filter.lf --sub= --args='-u old.txt new.txt' --exit=1 --level=lite < plugins/diff/diff-compact/samples/diff-unified.txt
      checks:
        - name: stdout
          data:
            - "--- old.txt\t2026-06-08 01:00:00"
            - "+++ new.txt\t2026-06-08 01:10:00"
            - '@@ -1,12 +1,13 @@'
            - ' title = "checkout"'
            - ' owner = "payments"'
            - -replicas = 2
            - +replicas = 3
            - ' timeout_ms = 750'
            - ' retry = 2'
            - -feature_gate = "legacy"
            - +feature_gate = "adaptive"
            - ' region = "ap-southeast-1"'
            - ' cell = "blue"'
            - +max_inflight = 120
            - '@@ -25,12 +26,14 @@'
            - -pool_size = 10
            - +pool_size = 20
            - -endpoint = "https://payments.internal/v1"
            - +endpoint = "https://payments.internal/v2"
            - +circuit_breaker = true
        - name: exitcode
          data:
            - "0"
    - command: lowfat filter plugins/diff/diff-compact/filter.lf --sub= --args='-u old.txt new.txt' --exit=1 --level=lite < plugins/diff/diff-compact/samples/diff-unified.txt | scripts/measure.py
      checks:
