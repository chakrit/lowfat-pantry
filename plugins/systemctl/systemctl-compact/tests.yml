# Golden/invariant cases for systemctl-compact. Provisional format (smoke harness pending).
command: systemctl
synthetic: true
cases:
  - sample: samples/systemctl-status.txt
    sub: status
    args: "status nginx"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/systemctl-list-units.txt
    sub: list-units
    args: "list-units --type=service"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/systemctl-is-active.txt
    sub: is-active
    args: "is-active nginx"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/systemctl-status-failed.txt
    sub: status
    args: "status checkout-worker"
    exit: 3
    levels: [lite, full, ultra]

