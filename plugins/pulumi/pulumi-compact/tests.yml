# Golden/invariant cases for pulumi-compact. Provisional format (smoke harness
# pending). All samples real-captured from pulumi/pulumi-base:latest (v3.245.0)
# with the local file backend and the random provider (30-resource YAML stack).
command: pulumi
cases:
  - sample: samples/pulumi-up.txt
    sub: up
    args: "up --yes"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/pulumi-up-change.txt
    sub: up
    args: "up --yes"
    exit: 0
    levels: [full, ultra]
  - sample: samples/pulumi-preview.txt
    sub: preview
    args: ""
    exit: 0
    levels: [full, ultra]
  - sample: samples/pulumi-preview-diff.txt
    sub: preview
    args: "preview --diff"
    exit: 0
    levels: [full]
  - sample: samples/pulumi-preview-err.txt
    sub: preview
    args: ""
    exit: 1
    levels: [lite, full, ultra]
  - sample: samples/pulumi-destroy.txt
    sub: destroy
    args: "destroy --yes"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/pulumi-stack.txt
    sub: stack
    args: "stack"
    exit: 0
    levels: [full, ultra]
  - sample: samples/pulumi-stack-ls.txt
    sub: stack
    args: "stack ls"
    exit: 0
    levels: [full]
  - sample: samples/pulumi-stack-output.txt
    sub: stack
    args: "stack output"
    exit: 0
    levels: [full, ultra]
