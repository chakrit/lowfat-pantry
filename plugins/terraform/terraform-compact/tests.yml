command: terraform
synthetic: true
cases:
  - sample: samples/terraform-plan.txt
    sub: plan
    args: "-out=tfplan"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/terraform-apply.txt
    sub: apply
    args: "-auto-approve tfplan"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/terraform-init-error.txt
    sub: init
    args: "-upgrade"
    exit: 1
    levels: [lite, full, ultra]
