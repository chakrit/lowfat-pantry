    - command: lowfat filter plugins/terraform/terraform-compact/filter.lf --sub=output --args='output -json' --exit=0 --level=lite < plugins/terraform/terraform-compact/samples/terraform-output-json.txt
      checks:
        - name: stdout
          data:
            - '{'
            - '  "config": {'
            - '    "sensitive": false,'
            - '    "type": ['
            - '      "object",'
            - '      {'
            - '        "region": "string",'
            - '        "replicas": "number",'
            - '        "tags": ['
            - '          "tuple",'
            - '          ['
            - '            "string",'
            - '            "string"'
            - '          ]'
            - '        ]'
            - '      }'
            - '    ],'
            - '    "value": {'
            - '      "region": "us-east-1",'
            - '      "replicas": 3,'
            - '      "tags": ['
            - '        "prod",'
            - '        "web"'
            - '      ]'
            - '    }'
            - '  },'
            - '  "greeting": {'
            - '    "sensitive": false,'
            - '    "type": "string",'
            - '    "value": "hello from terraform"'
            - '  },'
            - '  "servers": {'
            - '    "sensitive": false,'
            - '    "type": ['
            - '      "tuple",'
            - '      ['
            - '        "string",'
            - '        "string",'
            - '        "string"'
            - '      ]'
            - '    ],'
            - '    "value": ['
            - '      "web-0",'
            - '      "web-1",'
            - '      "web-2"'
            - '    ]'
            - '  }'
            - '}'
        - name: exitcode
          data:
            - "0"
    - command: lowfat filter plugins/terraform/terraform-compact/filter.lf --sub=output --args='output -json' --exit=0 --level=lite < plugins/terraform/terraform-compact/samples/terraform-output-json.txt | scripts/measure.py
      checks:
        - name: stdout
          data:
            - lines 48
            - bytes 713
        - name: exitcode
          data:
            - "0"
