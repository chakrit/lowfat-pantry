command: prisma
synthetic: true
cases:
  - sample: samples/prisma-generate.txt
    sub: generate
    args: ""
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/prisma-migrate.txt
    sub: migrate
    args: "deploy"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/prisma-error.txt
    sub: migrate
    args: "dev"
    exit: 1
    levels: [lite, full, ultra]
