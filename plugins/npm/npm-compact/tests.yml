# Golden/invariant cases for npm-compact. Provisional format (smoke harness pending).
command: npm
synthetic: true
cases:
  - sample: samples/npm-install.txt
    sub: install
    args: ""
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/npm-test.txt
    sub: test
    args: ""
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/npm-error.txt
    sub: install
    args: ""
    exit: 1
    levels: [lite, full, ultra]
