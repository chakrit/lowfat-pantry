- name: tests.cue \ apk-compact \ samples/apk-add.txt lite
  commands:
    - command: lowfat filter plugins/apk/apk-compact/filter.lf --sub=add --args='add jq' --exit=0 --level=lite < plugins/apk/apk-compact/samples/apk-add.txt
      checks:
        - name: stdout
          data:
            - 'OK: 9424 KiB in 18 packages'
        - name: exitcode
          data:
            - "0"
    - command: lowfat filter plugins/apk/apk-compact/filter.lf --sub=add --args='add jq' --exit=0 --level=lite < plugins/apk/apk-compact/samples/apk-add.txt | scripts/measure.py
      checks:
        - name: stdout
          data:
            - lines 1
            - bytes 28
        - name: exitcode
          data:
            - "0"
