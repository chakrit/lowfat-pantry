# Golden/invariant cases for docker-compose-compact. Provisional format (smoke harness pending).
command: docker-compose
synthetic: true
cases:
  - sample: samples/docker-compose-up.txt
    sub: up
    args: "up"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/docker-compose-logs.txt
    sub: logs
    args: "logs api"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/docker-compose-ps.txt
    sub: ps
    args: "ps"
    exit: 0
    levels: [lite, full, ultra]
  - sample: samples/docker-compose-build-error.txt
    sub: build
    args: "build api"
    exit: 1
    levels: [lite, full, ultra]

